name: Build Fabric Mod Jar

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod jars (with retry)
        run: |
          for i in 1 2 3; do
            gradle --stacktrace --no-daemon clean build && break
            echo "Gradle build attempt $i failed, retrying in 20s..."
            sleep 20
          done

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lagfree-${{ github.run_number }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-javadoc.jar
          if-no-files-found: error
          retention-days: 14
