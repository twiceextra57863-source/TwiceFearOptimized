name: Build Fabric Mod Jar

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build remapped mod jar (with retry)
        run: |
          for i in 1 2 3; do
            gradle --stacktrace --no-daemon clean remapJar sourcesJar && break
            echo "Gradle build attempt $i failed, retrying in 20s..."
            sleep 20
          done

      - name: Show build outputs
        if: always()
        run: |
          echo "=== build/libs ==="
          ls -lah build/libs || true

      - name: Prepare artifact bundle
        if: always()
        run: |
          mkdir -p ci-artifacts
          shopt -s nullglob
          runtime_found=0
          for f in build/libs/*.jar; do
            if [[ "$f" == *-sources.jar || "$f" == *-javadoc.jar ]]; then
              continue
            fi
            cp "$f" ci-artifacts/
            runtime_found=1
          done

          if [[ $runtime_found -eq 0 ]]; then
            echo "No runtime JAR found; attaching sources or diagnostics fallback." > ci-artifacts/README.txt
            for f in build/libs/*-sources.jar; do
              cp "$f" ci-artifacts/
            done
          fi

      - name: Upload mod artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lagfree-artifacts-${{ github.run_number }}
          path: ci-artifacts/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lagfree-diagnostics-${{ github.run_number }}
          path: |
            build/reports/**
            build/tmp/**
          if-no-files-found: warn
          retention-days: 14
